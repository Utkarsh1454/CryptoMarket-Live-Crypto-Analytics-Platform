<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Crypto | CryptoMarket</title>
    <meta name="description" content="Top trending, gaining, and losing cryptocurrencies right now.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ── Trending-specific styles ── */
        .trending-hero {
            background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(139,92,246,0.08));
            border-bottom: 1px solid var(--border);
            padding: 48px 24px 36px;
        }
        .trending-hero-inner { max-width: 1400px; margin: 0 auto; }
        .trending-hero h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 8px; }
        .trending-hero p  { color: var(--text-2); font-size: 0.95rem; }

        .trending-tabs {
            max-width: 1400px; margin: 0 auto;
            display: flex; gap: 6px; padding: 28px 24px 0;
        }
        .ttab {
            padding: 9px 20px; border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent; color: var(--text-2);
            font-family: inherit; font-size: 0.88rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s ease;
        }
        .ttab:hover { color: var(--text-1); border-color: rgba(255,255,255,0.15); }
        .ttab.active {
            background: var(--btn-grad); border-color: transparent;
            color: #fff; box-shadow: 0 0 14px var(--blue-glow);
        }

        .trending-grid {
            max-width: 1400px; margin: 28px auto;
            padding: 0 24px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }
        .trend-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px 20px;
            display: flex; align-items: center; gap: 16px;
            cursor: pointer; transition: all 0.2s ease;
            position: relative; overflow: hidden;
        }
        .trend-card::before {
            content: ''; position: absolute; inset: 0;
            background: var(--btn-grad); opacity: 0;
            transition: opacity 0.2s ease;
        }
        .trend-card:hover { border-color: rgba(59,130,246,0.35); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(59,130,246,0.1); }
        .trend-card:hover::before { opacity: 0.03; }

        .trend-rank {
            font-size: 0.8rem; color: var(--text-3); font-weight: 600;
            width: 22px; text-align: center; flex-shrink: 0;
        }
        .trend-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; font-weight: 700; color: #fff;
            flex-shrink: 0;
        }
        .trend-info { flex: 1; min-width: 0; }
        .trend-name   { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .trend-symbol { font-size: 0.78rem; color: var(--text-2); font-family: 'JetBrains Mono', monospace; }
        .trend-right  { text-align: right; flex-shrink: 0; }
        .trend-price  { font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; font-weight: 600; }
        .trend-pct    { font-size: 0.82rem; font-weight: 600; margin-top: 3px; }
        .trend-pct.up   { color: var(--green); }
        .trend-pct.down { color: var(--red); }
        .trend-spark { width: 90px; height: 36px; flex-shrink: 0; }

        .section-label {
            max-width: 1400px; margin: 8px auto 0; padding: 0 24px;
            font-size: 0.72rem; font-weight: 600; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--text-3);
        }

        .stats-strip {
            max-width: 1400px; margin: 0 auto 8px;
            padding: 0 24px;
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        .strip-stat {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 18px;
            display: flex; align-items: center; gap: 12px;
            flex: 1 1 180px;
        }
        .strip-stat i { color: var(--blue); width: 18px; text-align: center; }
        .strip-stat-label { font-size: 0.75rem; color: var(--text-2); }
        .strip-stat-val   { font-size: 1rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        .loading-grid {
            max-width: 1400px; margin: 60px auto;
            text-align: center; color: var(--text-2);
        }
        @media (max-width: 640px) {
            .trending-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav class="navbar">
        <div class="nav-inner">
            <a class="nav-brand" href="index.html">
                <div class="nav-logo"><i class="fa-solid fa-chart-line"></i></div>
                <span>Crypto<strong>Market</strong></span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Markets</a>
                <a href="trending.html" class="nav-link active">Trending</a>
                <a href="news.html" class="nav-link">News</a>
            </div>
            <div class="nav-right">
                <select id="currency-select" class="currency-select" onchange="changeCurrency(this.value)">
                    <option value="usd">$ USD</option>
                    <option value="eur">€ EUR</option>
                    <option value="gbp">£ GBP</option>
                    <option value="inr">₹ INR</option>
                    <option value="jpy">¥ JPY</option>
                    <option value="cad">C$ CAD</option>
                    <option value="aud">A$ AUD</option>
                    <option value="cny">¥ CNY</option>
                    <option value="btc">₿ BTC</option>
                    <option value="eth">Ξ ETH</option>
                </select>
                <div class="nav-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="Search coins...">
                </div>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="trending-hero">
        <div class="trending-hero-inner">
            <h1>🔥 <span class="grad-text">Trending</span> Crypto</h1>
            <p>Live top movers, gainers, losers and newly listed coins — updated every load</p>
        </div>
    </section>

    <!-- STATS STRIP -->
    <div style="max-width:1400px;margin:24px auto 0;padding:0 24px;">
        <div class="stats-strip">
            <div class="strip-stat"><i class="fa-solid fa-fire"></i><div><div class="strip-stat-label">Top Gainer (24h)</div><div class="strip-stat-val" id="top-gainer">--</div></div></div>
            <div class="strip-stat"><i class="fa-solid fa-arrow-trend-down"></i><div><div class="strip-stat-label">Top Loser (24h)</div><div class="strip-stat-val" id="top-loser">--</div></div></div>
            <div class="strip-stat"><i class="fa-solid fa-bolt"></i><div><div class="strip-stat-label">Highest Volume</div><div class="strip-stat-val" id="top-vol">--</div></div></div>
            <div class="strip-stat"><i class="fa-solid fa-star"></i><div><div class="strip-stat-label">New Listings</div><div class="strip-stat-val" id="new-count">--</div></div></div>
        </div>
    </div>

    <!-- TABS -->
    <div class="trending-tabs">
        <button class="ttab active" data-tab="gainers">🚀 Top Gainers</button>
        <button class="ttab" data-tab="losers">📉 Top Losers</button>
        <button class="ttab" data-tab="volume">⚡ High Volume</button>
        <button class="ttab" data-tab="new">✨ New Listings</button>
    </div>

    <!-- GRID -->
    <div class="loading-grid" id="loading-grid">
        <div class="loading-pulse"><div class="pulse-dot"></div> Fetching trending data...</div>
    </div>
    <div class="trending-grid" id="trending-grid" style="display:none"></div>

    <!-- FOOTER -->
    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <div class="nav-logo sm"><i class="fa-solid fa-chart-line"></i></div>
                <span>CryptoMarket</span>
            </div>
            <p class="footer-credit">Market data by <a href="https://coinpaprika.com" target="_blank">Coinpaprika</a></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="currency.js"></script>
    <script src="search.js"></script>
    <script src="trending.js"></script>
</body>
</html>
